<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC formule - Rekenmeester</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root {
      --accent: #4da3ff;
      --accent-dark: #2d7fe0;
      --accent-light: #7ec3ff;
      --purple: #8b5cf6;
      --card-bg: rgba(15, 18, 30, 0.70);
      --card-border: rgba(255,255,255,0.10);
      --text-soft: rgba(255,255,255,0.85);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(10, 15, 28, 0.72), rgba(8, 10, 18, 0.82)),
        url("achtergrond.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      min-height: 100vh;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 82px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: rgba(8, 12, 22, 0.55);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .brand img {
      width: 24px;
      height: 24px;
      filter: brightness(0) invert(1);
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 120px 20px 40px;
    }

    .form-box {
      width: 100%;
      max-width: 760px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.30);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 40px;
      background: linear-gradient(90deg, #ffffff, var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-soft);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .formula-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .formula-title {
      color: var(--accent-light);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .formula-text {
      font-size: 22px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: white;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.95);
      font-size: 16px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    button,
    .back-btn {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      box-shadow: 0 8px 18px rgba(77, 163, 255, 0.22);
    }

    button:hover {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
    }

    .back-btn {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(77, 163, 255, 0.12);
      border: 1px solid rgba(77, 163, 255, 0.28);
      min-height: 70px;
      line-height: 1.6;
    }

    .tip {
      margin-top: 18px;
      color: var(--text-soft);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .form-box {
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <a href="index.html" class="brand">
      <img src="favicon.png" alt="Logo">
      <span>∑ Rekenmeester</span>
    </a>
  </header>

  <main class="page">
    <section class="form-box">
      <h1>ABC formule</h1>
      <p class="subtitle">
        Vul hieronder de waarden van <strong>a</strong>, <strong>b</strong> en <strong>c</strong> in
        om de oplossingen van <strong>ax² + bx + c = 0</strong> te berekenen.
      </p>

      <div class="formula-box">
        <div class="formula-title">Formule</div>
        <div class="formula-text">x = (-b ± √(b² - 4ac)) / 2a</div>
      </div>

      <div class="grid">
        <div>
          <label for="a">Waarde van a</label>
          <input type="number" id="a" placeholder="Bijvoorbeeld 1">
        </div>

        <div>
          <label for="b">Waarde van b</label>
          <input type="number" id="b" placeholder="Bijvoorbeeld -3">
        </div>

        <div>
          <label for="c">Waarde van c</label>
          <input type="number" id="c" placeholder="Bijvoorbeeld 2">
        </div>
      </div>

      <div class="button-row">
        <button onclick="berekenABC()">Bereken</button>
        <a href="index.html" class="back-btn">Terug naar home</a>
      </div>

      <div class="result" id="resultaat">
        Hier komt het antwoord te staan.
      </div>

      <div class="tip">
        Tip: bij x² - 3x + 2 = 0 vul je a = 1, b = -3 en c = 2 in.
      </div>
    </section>
  </main>

  <script>
    function berekenABC() {
      let a = parseFloat(document.getElementById("a").value);
      let b = parseFloat(document.getElementById("b").value);
      let c = parseFloat(document.getElementById("c").value);
      let resultaat = document.getElementById("resultaat");

      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        resultaat.innerHTML = "Vul eerst alle drie de waarden in.";
        return;
      }

      if (a === 0) {
        resultaat.innerHTML = "a mag niet 0 zijn, anders is het geen ABC-formule.";
        return;
      }

      let d = b * b - 4 * a * c;

      if (d < 0) {
        resultaat.innerHTML =
          "De discriminant is " + d + ". Er zijn geen echte oplossingen.";
      } else if (d === 0) {
        let x = (-b) / (2 * a);
        resultaat.innerHTML =
          "De discriminant is 0. Er is 1 oplossing: x = " + x.toFixed(2);
      } else {
        let x1 = (-b + Math.sqrt(d)) / (2 * a);
        let x2 = (-b - Math.sqrt(d)) / (2 * a);
        resultaat.innerHTML =
          "De discriminant is " + d + ". Er zijn 2 oplossingen:<br>" +
          "x₁ = " + x1.toFixed(2) + "<br>" +
          "x₂ = " + x2.toFixed(2);
      }
    }
  </script>
</body>
</html>
